<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PassportPro AI | Studio by Ayush Acharya</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;800&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #4f46e5; --accent: #06b6d4; --text-main: #0f172a; --text-muted: #64748b; --bg: #f8fafc; }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
    body { background-color: var(--bg); color: var(--text-main); padding-bottom: 50px; }
    header { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); padding: 0 8%; height: 70px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 2000; border-bottom: 1px solid rgba(0,0,0,0.05); }
    .logo { font-weight: 800; font-size: 1.4rem; color: var(--primary); text-decoration: none; letter-spacing: -1px; }
    .hero { text-align: center; padding: 20px; max-width: 1100px; margin: 0 auto; }
    .tool-card { background: white; border-radius: 32px; padding: 2rem; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.08); margin-top: 20px; }
    .editor-grid { display: grid; grid-template-columns: 1fr 360px; gap: 30px; margin-top: 20px; text-align: left; }
    @media (max-width: 950px) { .editor-grid { grid-template-columns: 1fr; } }
    #canvas-container { background: #f1f5f9; border-radius: 24px; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px; border: 1px solid #e2e8f0; min-height: 500px; }
    canvas { max-width: 100%; max-height: 480px; box-shadow: 0 20px 40px rgba(0,0,0,0.12); background: white; border-radius: 2px; }
    .controls { display: flex; flex-direction: column; gap: 15px; background: #f8fafc; padding: 25px; border-radius: 24px; border: 1px solid #e2e8f0; }
    .control-group { display: flex; flex-direction: column; gap: 6px; }
    label { font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    select, input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #cbd5e1; font-weight: 600; background: white; outline: none; }
    .btn { padding: 14px 20px; border-radius: 12px; font-weight: 700; cursor: pointer; border: none; text-align: center; transition: 0.2s; }
    .btn-main { background: var(--primary); color: white; width: 100%; }
    .btn-print { background: #1e293b; color: white; margin-top: 5px; }
    .btn-download { background: #10b981; color: white; text-decoration: none; }
    .loader { display: none; width: 45px; height: 45px; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 40px auto; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    #upload-ui { padding: 100px 20px; border: 2px dashed #cbd5e1; border-radius: 32px; text-align: center; }
  </style>
</head>
<body>

  <header>
    <a href="#" class="logo">Passport<span style="color:var(--accent)">Pro</span> AI</a>
    <div style="font-size: 11px; font-weight: 800; color: var(--text-muted);">AYUSH ACHARYA</div>
  </header>

  <main class="hero">
    <div class="tool-card">
      <input type="file" id="imageInput" accept="image/*" style="display: none;">
      <div id="upload-ui">
        <h2>Professional Passport Maker</h2>
        <button class="btn btn-main" style="width:auto; padding: 18px 60px; margin-top:20px;" onclick="document.getElementById('imageInput').click()">Upload Portrait</button>
      </div>
      <div id="loader" class="loader"></div>

      <div id="result-container" style="display: none;">
        <div class="editor-grid">
          <div id="canvas-container">
            <p id="sizeLabel" style="font-size:12px; font-weight:800; color:var(--text-muted); margin-bottom:15px;"></p>
            <canvas id="mainCanvas"></canvas>
          </div>

          <div class="controls">
            <div class="control-group">
                <label>Dimensions</label>
                <select id="sizePreset">
                  <option value="1.2-1.4" selected>Your Custom (1.2" x 1.4")</option>
                  <option value="1.37-1.77">Standard (35 x 45 mm)</option>
                  <option value="2-2">US Passport (2" x 2")</option>
                  <option value="custom">Manual Custom (Inch)</option>
                </select>
                <div id="customSizeArea" style="display:none; grid-template-columns: 1fr 1fr; gap:10px; margin-top:5px;">
                    <input type="number" id="customW" placeholder="Width" step="0.1" value="1.2">
                    <input type="number" id="customH" placeholder="Height" step="0.1" value="1.4">
                </div>
            </div>

            <div class="control-group">
                <label>Face Zoom</label>
                <input type="range" id="zoomRange" min="0.5" max="3" step="0.05" value="1">
            </div>

            <div class="control-group">
              <label>Background Color</label>
              <input type="color" id="bgColor" value="#ffffff" style="height:45px; cursor:pointer;">
            </div>

            <div class="control-group">
              <label>Cutting Border</label>
              <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <select id="borderWidth">
                  <option value="0">None</option>
                  <option value="1">1 px</option>
                  <option value="2">2 px</option>
                  <option value="4" selected>4 px</option>
                </select>
                <select id="borderColor">
                  <option value="#cccccc" selected>Grey</option>
                  <option value="#000000">Black</option>
                </select>
              </div>
            </div>

            <a id="downloadBtn" class="btn btn-download">Download Single</a>
            <button id="printSheetBtn" class="btn btn-print">Generate 4x6 Portrait Sheet</button>
            <button onclick="location.reload()" style="background:none; border:none; color:var(--text-muted); cursor:pointer; font-size: 11px; text-decoration: underline;">Upload New</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <canvas id="sheetCanvas" style="display:none;"></canvas>

  <script>
    const API_KEY = 'y6sA4tNyVNtUJvZDzRBteAJR'; 
    const imageInput = document.getElementById('imageInput');
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const sheetCanvas = document.getElementById('sheetCanvas');
    const sCtx = sheetCanvas.getContext('2d');
    
    let subjectImg = new Image();
    let zoomFactor = 1.0;
    const DPI = 300;

    imageInput.addEventListener('change', async () => {
      const file = imageInput.files[0];
      if (!file) return;
      document.getElementById('upload-ui').style.display = 'none';
      document.getElementById('loader').style.display = 'block';

      const formData = new FormData();
      formData.append('image_file', file);

      try {
        const response = await fetch('https://api.remove.bg/v1.0/removebg', {
          method: 'POST',
          headers: { 'X-Api-Key': API_KEY },
          body: formData
        });

        if (response.ok) {
          const blob = await response.blob();
          subjectImg.onload = () => {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('result-container').style.display = 'block';
            render();
          };
          subjectImg.src = URL.createObjectURL(blob);
        }
      } catch (err) { alert("API Error. Ensure you run this through Live Server."); location.reload(); }
    });

    function getDimensions() {
        const preset = document.getElementById('sizePreset').value;
        let w, h;
        if (preset === 'custom') {
            w = parseFloat(document.getElementById('customW').value) || 1.2;
            h = parseFloat(document.getElementById('customH').value) || 1.4;
        } else {
            [w, h] = preset.split('-').map(Number);
        }
        return { wPx: Math.round(w * DPI), hPx: Math.round(h * DPI), wIn: w, hIn: h };
    }

    function render() {
        if (!subjectImg.src) return;
        const dim = getDimensions();
        
        // Reset and clear canvas
        canvas.width = dim.wPx;
        canvas.height = dim.hPx;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        document.getElementById('sizeLabel').innerText = `SIZE: ${dim.wIn}" x ${dim.hIn}"`;

        // 1. Draw Background
        ctx.fillStyle = document.getElementById('bgColor').value;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 2. Draw Zoomed Subject
        const imgRatio = subjectImg.width / subjectImg.height;
        // Default height is 90% of canvas, then multiplied by zoom
        let drawH = canvas.height * 0.9 * zoomFactor; 
        let drawW = drawH * imgRatio;

        // Position subject
        const x = (canvas.width - drawW) / 2;
        const y = (canvas.height - drawH) / 2 + (canvas.height * 0.05);

        ctx.drawImage(subjectImg, x, y, drawW, drawH);
        
        // 3. Draw Border
        const bWidth = parseInt(document.getElementById('borderWidth').value);
        if(bWidth > 0) {
            ctx.strokeStyle = document.getElementById('borderColor').value;
            ctx.lineWidth = bWidth;
            ctx.strokeRect(bWidth/2, bWidth/2, canvas.width - bWidth, canvas.height - bWidth);
        }

        document.getElementById('downloadBtn').href = canvas.toDataURL("image/jpeg", 0.95);
        document.getElementById('downloadBtn').download = `passport-${dim.wIn}x${dim.hIn}.jpg`;
    }

    // Input Listeners
    ['sizePreset', 'bgColor', 'zoomRange', 'borderWidth', 'borderColor', 'customW', 'customH'].forEach(id => {
        document.getElementById(id).addEventListener('input', (e) => {
            if (id === 'sizePreset') document.getElementById('customSizeArea').style.display = (e.target.value === 'custom' ? 'grid' : 'none');
            if (id === 'zoomRange') zoomFactor = parseFloat(e.target.value);
            render();
        });
    });

    document.getElementById('printSheetBtn').addEventListener('click', () => {
        const dim = getDimensions();
        sheetCanvas.width = 4 * DPI; 
        sheetCanvas.height = 6 * DPI; 

        sCtx.fillStyle = "white";
        sCtx.fillRect(0, 0, sheetCanvas.width, sheetCanvas.height);

        const cols = Math.floor(sheetCanvas.width / dim.wPx);
        const rows = Math.floor(sheetCanvas.height / dim.hPx);
        const gapX = (sheetCanvas.width - (cols * dim.wPx)) / (cols + 1);
        const gapY = (sheetCanvas.height - (rows * dim.hPx)) / (rows + 1);

        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const x = gapX + c * (dim.wPx + gapX);
                const y = gapY + r * (dim.hPx + gapY);
                sCtx.drawImage(canvas, x, y);
            }
        }

        const link = document.createElement('a');
        link.download = `Ayush-Portrait-Sheet.jpg`;
        link.href = sheetCanvas.toDataURL("image/jpeg", 0.95);
        link.click();
    });
  </script>
</body>
</html>
